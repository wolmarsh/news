<aside class="sidebar">
    <div class="sidebar-section">
        <h3>Recent News</h3>
        <ul>
            {{ range first 5 (site.RegularPages.ByDate.Reverse) }}
            <li>
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
                <span>{{ .Date.Format "Jan 02" }}</span>
            </li>
            {{ end }}
        </ul>
    </div>
    <div class="sidebar-section">
        <h3>Quick Links</h3>
        <ul>
            <li><a href="/archives">Full Archives</a></li>
            <li><a href="https://github.com/wolmarsh">GitHub Profile</a></li>
        </ul>
    </div>
</aside>
<div class="floating-accent"></div>
